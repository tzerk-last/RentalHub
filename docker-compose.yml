services:

  db:
    image: postgres:16
    container_name: rentalhub_db
    environment:
      POSTGRES_DB: rentalhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: rentalhub_app
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Database=rentalhub;Username=postgres;Password=postgres123
      - Email__Host=smtp.gmail.com
      - Email__Port=587
      - Email__SenderName=RentalHub
      - Email__SenderEmail=${EMAIL_SENDER}
      - Email__Username=${EMAIL_USERNAME}
      - Email__Password=${EMAIL_PASSWORD}
      - OpenAI__ApiKey=${OPENAI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/wwwroot/uploads
      - kyc_data:/app/wwwroot/kyc

volumes:
  postgres_data:
  uploads_data:
  kyc_data:
